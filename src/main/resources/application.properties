server.address=0.0.0.0
server.port=8083

# ═══════════════════════════════════════════════════
#  SESSION — persisted in MySQL via Spring Session JDBC
#  Sessions survive server restarts; no more 401 after redeploy.
#  Spring auto-creates SPRING_SESSION + SPRING_SESSION_ATTRIBUTES tables.
# ═══════════════════════════════════════════════════
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
# Session lives 7 days of inactivity (React Native users don't hit logout)
server.servlet.session.timeout=7d

# ═══════════════════════════════════════════════════
#  JPA / HIBERNATE
# ═══════════════════════════════════════════════════
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

